name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include error messages or unexpected output.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Gem version, Ruby, Rails, transport (stdio/HTTP/CLI)
      value: |
        - rails-ai-context:
        - Ruby:
        - Rails:
        - Transport: stdio
    validations:
      required: true
