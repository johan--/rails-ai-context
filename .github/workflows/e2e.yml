name: E2E

# End-to-end harness — builds a fresh Rails app per install path
# (in-Gemfile, standalone, zero-config), exercises the install generator,
# every CLI tool, the MCP stdio protocol, and the MCP HTTP protocol.
#
# Runs on push to main and on manual dispatch. Skipped on PRs (too slow
# for the signal-to-noise ratio — unit + hardening specs cover PR surface).
# Runs separately from ci.yml so the 30-min job doesn't fail-stop the
# per-commit matrix.
#
# Security: matrix values (ruby/rails versions) are workflow-controlled,
# not attacker-controlled. No untrusted github.event.* inputs are used.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # Rails 8.0 + 8.1 require Ruby 3.3+ (active_support drop)
          - ruby: "3.3"
            rails: "7.1"
          - ruby: "3.3"
            rails: "7.2"
          - ruby: "3.3"
            rails: "8.0"
          - ruby: "3.4"
            rails: "8.0"
          - ruby: "3.4"
            rails: "8.1"

    name: E2E — Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        # Wait for postgres to be ready before starting the harness.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      E2E: "1"
      RAILS_VERSION: ${{ matrix.rails }}
      BUNDLE_WITHOUT: "development"
      # Postgres connection params consumed by spec/e2e/postgres_install_spec.rb
      # via the rewritten config/database.yml in TestAppBuilder.
      TEST_POSTGRES: "1"
      PGHOST: "localhost"
      PGPORT: "5432"
      PGUSER: "postgres"
      PGPASSWORD: "postgres"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install Rails globally (for `rails new`)
        env:
          RAILS_MAJOR_MINOR: ${{ matrix.rails }}
        run: gem install rails -v "~> ${RAILS_MAJOR_MINOR}.0" --no-document

      - name: Install Postgres client + create per-job DB names
        env:
          E2E_DB_SUFFIX: ${{ matrix.ruby }}-${{ matrix.rails }}
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          # Create the dev + test databases referenced by config/database.yml
          PGPASSWORD="$PGPASSWORD" createdb -h "$PGHOST" -U "$PGUSER" "rails_ai_context_e2e_dev_${E2E_DB_SUFFIX}"
          PGPASSWORD="$PGPASSWORD" createdb -h "$PGHOST" -U "$PGUSER" "rails_ai_context_e2e_test_${E2E_DB_SUFFIX}"

      - name: Run E2E harness
        env:
          E2E_DB_SUFFIX: ${{ matrix.ruby }}-${{ matrix.rails }}
        run: bundle exec rspec spec/e2e --format documentation --format json --out tmp/e2e-report.json
        timeout-minutes: 25

      - name: Upload E2E report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-ruby${{ matrix.ruby }}-rails${{ matrix.rails }}
          path: tmp/e2e-report.json
          retention-days: 14
